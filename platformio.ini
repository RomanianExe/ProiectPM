; PlatformIO Project Configuration File
; Smart Trash Can — ATmega328P
;
; framework = arduino is kept so PlatformIO resolves the avr-gcc toolchain
; and AVR headers automatically.  No Arduino library code is used;
; int main() in main.cpp takes precedence over the framework's own main().

[env:ATmega328P]
platform = atmelavr
board = ATmega328P
framework = arduino
board_build.f_cpu = 16000000L

; ── Upload via mEDBG (EDBG / xplainedmini programmer) ───────────────────────
;
; The ATmega328 Xplained Mini's on-board mEDBG programs the chip directly
; over USB HID using the EDBG protocol.  There is NO UART bootloader —
; the COM port is only a serial debug bridge, not a programming channel.
; That is why arduino / urclock both fail with "not in sync".
;
; avrdude programmer type "xplainedmini" talks to the mEDBG over USB
; directly, so no upload_port or upload_speed is needed.
;
; ── Driver note ─────────────────────────────────────────────────────────────
; On Windows, avrdude needs WinUSB access to the mEDBG HID interface.
; If you see "No device found" or USB permission errors, install
; Microchip Studio (free) once — its installer sets up the correct driver.
; Alternatively, use Zadig to assign the WinUSB driver to the mEDBG device.

monitor_port = COM3
monitor_speed = 9600

upload_protocol = custom
upload_flags =
    -C
    $PROJECT_PACKAGES_DIR/tool-avrdude/avrdude.conf
    -p
    atmega328p
    -c
    xplainedmini
upload_command = avrdude $UPLOAD_FLAGS -U flash:w:$SOURCE:i
